name: Refresh BuyMe catalog

# Re-scrapes buyme.co.il weekly and commits data/buyme.json. The push triggers a
# Vercel production deploy, so the live MCP server + site always serve fresh data.
# Runs on any plan (the scrape happens on the GitHub runner, not in a Vercel function).

on:
  schedule:
    - cron: "0 4 * * 1" # Mondays 04:00 UTC
  workflow_dispatch: {} # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: refresh-catalog
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Scrape catalog
        run: node scripts/scrape.mjs
      - name: Commit if changed
        run: |
          if git diff --quiet -- data/buyme.json; then
            echo "Catalog unchanged — nothing to deploy."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/buyme.json
            git commit -m "chore: weekly BuyMe catalog refresh"
            git push
            echo "Pushed refreshed catalog — Vercel will redeploy."
          fi
